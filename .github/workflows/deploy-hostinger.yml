name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📦 Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔨 Install Dependencies
        run: |
          npm install --force --legacy-peer-deps
          npm list react-leaflet leaflet

      - name: 📝 Create .env file
        run: |
          echo "VITE_SUPABASE_URL=https://eviukbluwrwcblwhkzwz.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=sb_publishable_5FFYs0bPMCjQZTawObPk2A_lK5jmGJY" >> .env
          echo "VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}" >> .env

      - name: 🏗️ Build Project
        run: |
          npm run build || (echo "Build failed, listing node_modules..." && ls -R node_modules/react-leaflet && exit 1)
        env:
          # É importante que essas variáveis estejam nos Secrets do GitHub também se forem sensíveis
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: 📂 Sync files (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: public_html/
          protocol: ftp
          delete-removed: true
          state-name: .ftp-deploy-sync-state-v2.json
          timeout: 300000
